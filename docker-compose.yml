services:
  soniq-mcp:
    build: .
    ports:
      - "${SONIQ_MCP_HTTP_PORT:-8000}:${SONIQ_MCP_HTTP_PORT:-8000}"
    environment:
      SONIQ_MCP_TRANSPORT: ${SONIQ_MCP_TRANSPORT:-http}
      SONIQ_MCP_HTTP_HOST: ${SONIQ_MCP_HTTP_HOST:-0.0.0.0}
      SONIQ_MCP_HTTP_PORT: ${SONIQ_MCP_HTTP_PORT:-8000}
      SONIQ_MCP_EXPOSURE: ${SONIQ_MCP_EXPOSURE:-home-network}
      SONIQ_MCP_LOG_LEVEL: ${SONIQ_MCP_LOG_LEVEL:-INFO}
      SONIQ_MCP_DEFAULT_ROOM: ${SONIQ_MCP_DEFAULT_ROOM:-}
      SONIQ_MCP_MAX_VOLUME_PCT: ${SONIQ_MCP_MAX_VOLUME_PCT:-80}
      SONIQ_MCP_TOOLS_DISABLED: ${SONIQ_MCP_TOOLS_DISABLED:-}
      # Optional HTTP authentication (auth_mode=none by default; set in .env to enable).
      SONIQ_MCP_AUTH_MODE: ${SONIQ_MCP_AUTH_MODE:-none}
      SONIQ_MCP_AUTH_TOKEN: ${SONIQ_MCP_AUTH_TOKEN:-}
      SONIQ_MCP_OIDC_ISSUER: ${SONIQ_MCP_OIDC_ISSUER:-}
      SONIQ_MCP_OIDC_AUDIENCE: ${SONIQ_MCP_OIDC_AUDIENCE:-}
      SONIQ_MCP_OIDC_JWKS_URI: ${SONIQ_MCP_OIDC_JWKS_URI:-}
      SONIQ_MCP_OIDC_CA_BUNDLE: ${SONIQ_MCP_OIDC_CA_BUNDLE:-}
      SONIQ_MCP_OIDC_RESOURCE_URL: ${SONIQ_MCP_OIDC_RESOURCE_URL:-}
      SSL_CERT_FILE: ${SSL_CERT_FILE:-}
    restart: unless-stopped
