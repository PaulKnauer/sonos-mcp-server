services:
  soniq-mcp:
    build: .
    ports:
      - "${SONIQ_MCP_HTTP_PORT:-8000}:${SONIQ_MCP_HTTP_PORT:-8000}"
    environment:
      SONIQ_MCP_TRANSPORT: ${SONIQ_MCP_TRANSPORT:-http}
      SONIQ_MCP_HTTP_HOST: ${SONIQ_MCP_HTTP_HOST:-0.0.0.0}
      SONIQ_MCP_HTTP_PORT: ${SONIQ_MCP_HTTP_PORT:-8000}
      SONIQ_MCP_EXPOSURE: ${SONIQ_MCP_EXPOSURE:-home-network}
      SONIQ_MCP_LOG_LEVEL: ${SONIQ_MCP_LOG_LEVEL:-INFO}
      SONIQ_MCP_DEFAULT_ROOM: ${SONIQ_MCP_DEFAULT_ROOM:-}
      SONIQ_MCP_MAX_VOLUME_PCT: ${SONIQ_MCP_MAX_VOLUME_PCT:-80}
      SONIQ_MCP_TOOLS_DISABLED: ${SONIQ_MCP_TOOLS_DISABLED:-}
    restart: unless-stopped
