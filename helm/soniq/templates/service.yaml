apiVersion: v1
kind: Service
metadata:
  name: {{ include "soniq.fullname" . }}
  labels:
    {{- include "soniq.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    {{- include "soniq.selectorLabels" . | nindent 4 }}
